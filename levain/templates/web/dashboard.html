<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Levain · substrate control</title>
<style>
  /* ───────────────────────────────────────────────────────────────────────
     LEVAIN substrate control — the machine that houses the organism.
     A mid-century optimistic-robotic-future control chassis (the panel) over a
     living substrate (the rings). One self-contained stylesheet, system fonts
     only, zero deps — survives offline. The operator tunes a living thing
     through physical glass.

     The living rings: concentric one-sided-border ARCS, each rotating + breathing
     at its own rate, mix-blend screen for additive bioluminescent glow. The
     spectrum is bioluminescent-atomic (aurora / deep-sea, NOT neon-noir) and the
     deck pulls its zone colors FROM it — one organism. The rings are the
     substrate's VITAL SIGNS: vivid + alive when the write-path is LIVE, dim +
     desaturated when DARK. (Architecture studied from phillipclapham.com's
     founder-mode pulse-rings; reimplemented sovereign + health-reactive.)
     ─────────────────────────────────────────────────────────────────────── */
  :root {
    /* chassis (the robot) — warm atomic-age dark, not cold blue-black */
    --bg: #080b0b;
    --panel: #0e1514;
    --panel-hi: #131d1b;
    --line: #243130;
    --line-hot: #38504a;
    /* phosphor / bioluminescent ink (the organism) */
    --ink: #d6e0dc;
    --dim: #7a8884;
    --faint: #4c5854;
    /* the bioluminescent-atomic spectrum — zones + rings draw from one source */
    --mind: #5ce6a8;       /* cognition — alive green */
    --operate: #f5b14e;    /* verbs — atomic amber/gold */
    --identity: #3fd6cf;   /* config — atomic teal */
    --hot: #f5806e;        /* alert / hot tier — warm coral */
    --r-green: #5ce6a8; --r-teal: #2fd9c4; --r-cyan: #46cfe0;
    --r-sky: #6ab8f0; --r-gold: #f5b14e; --r-coral: #f5806e;
    --classA: #5ce6a8;
    --classB: #f5b14e;
    --classC: #8aa39c;
    --node: #5ce6a8;
    --edge: #275448;
    --mono: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
    --label: "Helvetica Neue", "Arial Narrow", "Roboto Condensed", system-ui, sans-serif;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    background:
      radial-gradient(120% 70% at 50% -8%, rgba(63,214,207,.05), transparent 58%),
      radial-gradient(90% 55% at 102% 108%, rgba(92,230,168,.045), transparent 52%),
      repeating-linear-gradient(0deg, transparent 0 39px, rgba(92,230,168,.012) 39px 40px),
      repeating-linear-gradient(90deg, transparent 0 39px, rgba(63,214,207,.010) 39px 40px),
      var(--bg);
    color: var(--ink);
    font: 13px/1.55 var(--mono);
    padding: 18px 18px 60px;
    overflow-x: hidden;
    min-height: 100vh;
  }
  body::before {  /* CRT scanline veil over the whole deck. Plain alpha black, NO
    blend mode — a multiply layer over an animating backdrop re-blends every frame
    and shimmers; flat alpha over a dark UI is visually equivalent and static. */
    content: ""; position: fixed; inset: 0; pointer-events: none; z-index: 9;
    background: repeating-linear-gradient(0deg, rgba(0,0,0,.14) 0 1px, transparent 1px 3px);
    opacity: .3;
  }

  /* ── the living rings — the organism beneath the glass ────────────────────
     Vital-signs reactive: LIVE → vivid bioluminescence; DARK → dim, desaturated.
     JS sets body[data-vital] from health.write_path_live. */
  .rings {
    position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden;
    isolation: isolate;  /* contains the screen-blending inside this group */
    opacity: .28; filter: saturate(.92); transition: opacity 1.4s ease, filter 1.4s ease;
  }
  /* recede-to-background as a STATIC vignette painted over the rings — NOT a mask
     on the container: masking a group of independently-animating layers forces a
     full offscreen flatten of the group every frame (the flicker source); this
     ::after is just one more static layer inside the isolated group. */
  .rings::after {
    content: ""; position: absolute; inset: 0; z-index: 1;
    background: radial-gradient(closest-side at 50% 45%, transparent 10%, rgba(8,11,11,.62) 42%, rgba(8,11,11,.97) 72%);
  }
  /* CRT phosphor raster — a denser vintage-monitor scanline scoped to the ORGANISM
     (the chassis panels stay clean metal: the substrate lives behind the tube). Flat
     alpha + NO blend mode — a multiply over the animating rings would re-blend every
     frame (the killed flicker class); flat alpha is a static, compositor-free layer. */
  .rings::before {
    content: ""; position: absolute; inset: 0; z-index: 2; pointer-events: none;
    background:
      repeating-linear-gradient(0deg, rgba(26,10,0,.46) 0 1px, transparent 1px 3px),
      radial-gradient(125% 95% at 50% 45%, rgba(245,177,78,.07), transparent 62%);
    opacity: .85;
  }
  body[data-vital="dark"] .rings { opacity: .2; filter: grayscale(.62) brightness(.5); }
  .ring {
    position: absolute; inset: 0; margin: auto; border-radius: 50%;
    mix-blend-mode: screen;
  }
  /* progressive blur — inner rings anchored/sharper, outer ones dissolve into
     atmosphere; that ramp (+ lowered outer opacity + the soft mask) is what makes
     the rings a LIVING BACKGROUND, not foreground arcs competing with the UI. */
  /* FAT bands as conic-gradient ARCS (the phillipclapham.com founder-mode
     technique): each arc is a conic gradient with WIDE-spectrum stops — warm↔cool
     sweeps whose RGB midpoints (lime, peach) make the color-flow visible; hue-
     adjacent pairings read as one solid color under blur. FEATHERED radial
     annulus mask cuts the band (soft stops ±8-16px around inner = W/2 − bw,
     outer = W/2 — soft edges regardless of filter/mask paint order) — inner
     cluster interpenetrates, mids chain-overlap, outers dissolve. FIXED px sizes (the
     source's discipline): deterministic GPU texture budget regardless of display
     — vmin sizing ballooned to ~4000px textures on big screens = layer thrash =
     the deck flicker. Static opacity ramp .95 → .42 = depth. */
  .ring-0 { width: 210px; height: 210px; filter: blur(9px); opacity: .95;
    background: conic-gradient(transparent 0deg, transparent 90deg, var(--r-gold) 90deg, var(--r-green) 180deg, var(--r-cyan) 270deg, transparent 270deg);
    -webkit-mask: radial-gradient(circle, transparent 53px, #000 69px, #000 97px, transparent 113px);
    mask: radial-gradient(circle, transparent 53px, #000 69px, #000 97px, transparent 113px);
    animation: orbit-cw1 26s linear infinite; animation-delay: -3s; }
  .ring-1 { width: 304px; height: 304px; filter: blur(11px); opacity: .92;
    background: conic-gradient(var(--r-green) 0deg, var(--r-cyan) 90deg, var(--r-sky) 180deg, transparent 180deg);
    -webkit-mask: radial-gradient(circle, transparent 87px, #000 107px, #000 142px, transparent 162px);
    mask: radial-gradient(circle, transparent 87px, #000 107px, #000 142px, transparent 162px);
    animation: orbit-ccw1 33s linear infinite; animation-delay: -9s; }
  .ring-2 { width: 420px; height: 420px; filter: blur(12px); opacity: .9;
    background: conic-gradient(transparent 0deg, transparent 90deg, var(--r-coral) 90deg, var(--r-gold) 180deg, var(--r-green) 270deg, transparent 270deg);
    -webkit-mask: radial-gradient(circle, transparent 132px, #000 156px, #000 198px, transparent 222px);
    mask: radial-gradient(circle, transparent 132px, #000 156px, #000 198px, transparent 222px);
    animation: orbit-cw2 22s linear infinite; animation-delay: -5s; }
  .ring-3 { width: 550px; height: 550px; filter: blur(14px); opacity: .86;
    background: conic-gradient(transparent 0deg, transparent 180deg, var(--r-green) 180deg, var(--r-gold) 270deg, var(--r-coral) 360deg);
    -webkit-mask: radial-gradient(circle, transparent 219px, #000 239px, #000 265px, transparent 285px);
    mask: radial-gradient(circle, transparent 219px, #000 239px, #000 265px, transparent 285px);
    animation: orbit-ccw2 39s linear infinite; animation-delay: -15s; }
  .ring-4 { width: 720px; height: 720px; filter: blur(16px); opacity: .82;
    background: conic-gradient(var(--r-cyan) 0deg, var(--r-green) 90deg, var(--r-gold) 180deg, transparent 180deg);
    -webkit-mask: radial-gradient(circle, transparent 286px, #000 310px, #000 348px, transparent 372px);
    mask: radial-gradient(circle, transparent 286px, #000 310px, #000 348px, transparent 372px);
    animation: orbit-cw3 30s linear infinite; animation-delay: -2s; }
  .ring-5 { width: 910px; height: 910px; filter: blur(18px); opacity: .76;
    background: conic-gradient(transparent 0deg, transparent 90deg, var(--r-sky) 90deg, var(--r-cyan) 180deg, var(--r-green) 270deg, transparent 270deg);
    -webkit-mask: radial-gradient(circle, transparent 388px, #000 412px, #000 443px, transparent 467px);
    mask: radial-gradient(circle, transparent 388px, #000 412px, #000 443px, transparent 467px);
    animation: orbit-ccw1 28s linear infinite; animation-delay: -11s; }
  .ring-6 { width: 1120px; height: 1120px; filter: blur(21px); opacity: .7;
    background: conic-gradient(transparent 0deg, transparent 180deg, var(--r-coral) 180deg, var(--r-gold) 270deg, var(--r-green) 360deg);
    -webkit-mask: radial-gradient(circle, transparent 480px, #000 508px, #000 546px, transparent 574px);
    mask: radial-gradient(circle, transparent 480px, #000 508px, #000 546px, transparent 574px);
    animation: orbit-cw1 37s linear infinite; animation-delay: -6s; }
  .ring-7 { width: 1330px; height: 1330px; filter: blur(24px); opacity: .6;
    background: conic-gradient(var(--r-gold) 0deg, var(--r-green) 90deg, var(--r-teal) 180deg, transparent 180deg);
    -webkit-mask: radial-gradient(circle, transparent 590px, #000 618px, #000 651px, transparent 679px);
    mask: radial-gradient(circle, transparent 590px, #000 618px, #000 651px, transparent 679px);
    animation: orbit-ccw2 44s linear infinite; animation-delay: -19s; }
  .ring-8 { width: 1540px; height: 1540px; filter: blur(27px); opacity: .5;
    background: conic-gradient(transparent 0deg, transparent 90deg, var(--r-cyan) 90deg, var(--r-green) 180deg, var(--r-gold) 270deg, transparent 270deg);
    -webkit-mask: radial-gradient(circle, transparent 690px, #000 718px, #000 756px, transparent 784px);
    mask: radial-gradient(circle, transparent 690px, #000 718px, #000 756px, transparent 784px);
    animation: orbit-cw2 41s linear infinite; animation-delay: -13s; }
  /* interleaved + outer additions — denser organism, same recede-to-background ramp */
  .ring-9 { width: 484px; height: 484px; filter: blur(13px); opacity: .88;
    background: conic-gradient(var(--r-coral) 0deg, var(--r-gold) 180deg, transparent 180deg);
    -webkit-mask: radial-gradient(circle, transparent 188px, #000 208px, #000 232px, transparent 252px);
    mask: radial-gradient(circle, transparent 188px, #000 208px, #000 232px, transparent 252px);
    animation: orbit-ccw1 36s linear infinite; animation-delay: -7s; }
  .ring-10 { width: 814px; height: 814px; filter: blur(17px); opacity: .8;
    background: conic-gradient(transparent 0deg, transparent 180deg, var(--r-gold) 180deg, var(--r-coral) 360deg);
    -webkit-mask: radial-gradient(circle, transparent 342px, #000 366px, #000 395px, transparent 419px);
    mask: radial-gradient(circle, transparent 342px, #000 366px, #000 395px, transparent 419px);
    animation: orbit-cw3 43s linear infinite; animation-delay: -17s; }
  .ring-11 { width: 1214px; height: 1214px; filter: blur(22px); opacity: .65;
    background: conic-gradient(transparent 0deg, transparent 90deg, var(--r-sky) 90deg, var(--r-cyan) 180deg, var(--r-green) 270deg, transparent 270deg);
    -webkit-mask: radial-gradient(circle, transparent 538px, #000 562px, #000 595px, transparent 619px);
    mask: radial-gradient(circle, transparent 538px, #000 562px, #000 595px, transparent 619px);
    animation: orbit-ccw2 31s linear infinite; animation-delay: -4s; }
  .ring-12 { width: 1750px; height: 1750px; filter: blur(30px); opacity: .42;
    background: conic-gradient(transparent 0deg, transparent 180deg, var(--r-teal) 180deg, var(--r-green) 360deg);
    -webkit-mask: radial-gradient(circle, transparent 791px, #000 823px, #000 859px, transparent 891px);
    mask: radial-gradient(circle, transparent 791px, #000 823px, #000 859px, transparent 891px);
    animation: orbit-cw1 48s linear infinite; animation-delay: -22s; }
  /* the color-shifting blurred core — anchors the center, cycles the spectrum.
     Two layers so the BREATH reads: the halo stays atmospheric under heavy blur;
     the nucleus (a SIBLING — a child would inherit the parent's blur filter)
     carries a light blur + a pronounced scale/opacity swing = the visible pulse. */
  /* The PULSE rides the parent (transform+opacity = compositor-only); the COLOR
     cycle rides 6 pre-blurred sibling .hue layers that cross-fade opacity. Each .hue
     has a STATIC gradient, so its blur rasterizes ONCE and is cached — animating its
     opacity never re-runs the 32px blur. (The old `coreCycle` animated `background`
     UNDER the blur = a per-frame repaint+reblur loop.) Same exact atomic spectrum,
     compositor-cheap. [L2/codex HIGH — fix, exact colors preserved] */
  .core {
    position: absolute; inset: 0; margin: auto; width: 420px; height: 420px; border-radius: 50%;
    mix-blend-mode: screen; opacity: .55; animation: corePulse 10s infinite;
  }
  .nucleus {
    position: absolute; inset: 0; margin: auto; width: 180px; height: 180px; border-radius: 50%;
    mix-blend-mode: screen; opacity: .6; animation: nucleusPulse 10s infinite;
  }
  .core .hue, .nucleus .hue {
    position: absolute; inset: 0; border-radius: 50%; opacity: 0;
    animation: hueCycle 30s linear infinite;
  }
  .core .hue { filter: blur(32px); }
  .nucleus .hue { filter: blur(9px); }
  .hue.h1 { background: radial-gradient(circle, var(--r-green) 0%, transparent 70%); animation-delay: 0s; }
  .hue.h2 { background: radial-gradient(circle, var(--r-teal)  0%, transparent 70%); animation-delay: -5s; }
  .hue.h3 { background: radial-gradient(circle, var(--r-cyan)  0%, transparent 70%); animation-delay: -10s; }
  .hue.h4 { background: radial-gradient(circle, var(--r-sky)   0%, transparent 70%); animation-delay: -15s; }
  .hue.h5 { background: radial-gradient(circle, var(--r-gold)  0%, transparent 70%); animation-delay: -20s; }
  .hue.h6 { background: radial-gradient(circle, var(--r-coral) 0%, transparent 70%); animation-delay: -25s; }

  .deck { max-width: 1320px; margin: 0 auto; position: relative; z-index: 1; }

  /* ── masthead — the rack faceplate (brushed chassis + vent grille) ───────── */
  .masthead {
    display: flex; align-items: flex-end; justify-content: space-between;
    flex-wrap: wrap; gap: 14px 24px; border: 1px solid var(--line-hot); border-radius: 6px;
    background: linear-gradient(180deg, rgba(255,255,255,.045), transparent 40%), linear-gradient(180deg, #152120, #0c1413);
    padding: 13px 18px; position: relative; overflow: hidden;
    box-shadow: inset 0 1px 0 rgba(255,255,255,.06), 0 10px 30px -18px #000;
  }
  .masthead::before {  /* vent grille — chassis tactility */
    content: ""; position: absolute; top: 10px; bottom: 10px; right: 0; width: 64px; opacity: .5;
    background: repeating-linear-gradient(90deg, transparent 0 6px, rgba(0,0,0,.4) 6px 8px,
      rgba(255,255,255,.03) 8px 9px);
    -webkit-mask: linear-gradient(90deg, transparent, #000 60%); mask: linear-gradient(90deg, transparent, #000 60%);
  }
  .masthead::after {  /* one-time power-on sweep */
    content: ""; position: absolute; inset: 0; pointer-events: none;
    background: linear-gradient(105deg, transparent 30%, rgba(92,230,168,.13) 50%, transparent 70%); transform: translateX(-120%);
  }
  .brand { display: flex; flex-direction: column; gap: 3px; position: relative; }
  .wordmark {
    font-family: var(--label); font-weight: 800; font-size: 30px; line-height: .92;
    letter-spacing: .26em; text-transform: uppercase; color: var(--mind); padding-left: .12em;
    text-shadow: 0 0 18px rgba(92,230,168,.45), 0 0 2px rgba(92,230,168,.6);
    animation: wordGlow 5.5s ease-in-out infinite;
  }
  .model { font-family: var(--label); font-size: 10px; letter-spacing: .34em; text-transform: uppercase; color: var(--faint); font-weight: 600; }
  .readout { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; min-width: 0; }
  .unit { display: flex; align-items: baseline; gap: 9px; min-width: 0; }
  .unit-label { font-family: var(--label); font-size: 9px; letter-spacing: .3em; color: var(--faint); text-transform: uppercase; font-weight: 700; }
  .entity {
    font-family: var(--label); font-weight: 700; font-size: 21px; letter-spacing: .04em; color: var(--ink);
    text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 46vw;
  }
  .entity::after { content: "▮"; color: var(--mind); margin-left: .25em; font-size: .8em; animation: blink 1.25s steps(1) infinite; }
  .indicators { display: flex; align-items: center; gap: 9px; flex-wrap: wrap; justify-content: flex-end; }
  .stamp { color: var(--dim); font-size: 10px; letter-spacing: .04em; }
  button#refresh {
    font: 600 11px/1 var(--label); letter-spacing: .12em; text-transform: uppercase; color: var(--mind);
    background: linear-gradient(180deg, #18241f, #0e1714); border: 1px solid color-mix(in srgb, var(--mind) 35%, var(--line));
    border-radius: 4px; padding: 6px 12px; cursor: pointer; transition: all .14s ease;
    box-shadow: inset 0 1px 0 rgba(255,255,255,.07), 0 1px 0 #000;
  }
  button#refresh:hover { color: #06120c; background: var(--mind); box-shadow: 0 0 16px -3px var(--mind); }
  button#refresh:active { transform: translateY(1px); box-shadow: inset 0 2px 4px rgba(0,0,0,.4); }
  button#refresh:disabled { opacity: .4; cursor: default; box-shadow: none; }

  .sub { color: var(--faint); font-size: 10.5px; letter-spacing: .05em; margin: 9px 2px 14px; word-break: break-all; }
  .sub::before { content: "◇ store "; color: color-mix(in srgb, var(--mind) 60%, var(--faint)); }

  /* ── tabs — hardware toggles ───────────────────────────────────────────── */
  .tabs { display: flex; gap: 7px; margin: 0 0 16px; flex-wrap: wrap; }
  .tab {
    font: 700 11px/1 var(--label); letter-spacing: .14em; text-transform: uppercase; color: var(--dim);
    background: linear-gradient(180deg, #131e1c, #0c1513); border: 1px solid var(--line); border-bottom-width: 2px;
    border-radius: 4px; padding: 8px 15px; cursor: pointer; transition: all .14s ease;
  }
  .tab:hover { color: var(--ink); border-color: var(--line-hot); }
  .tab.active {
    color: #06120c; background: linear-gradient(180deg, var(--mind), #43c089); border-color: var(--mind);
    border-bottom-width: 1px; transform: translateY(1px); box-shadow: 0 0 18px -4px var(--mind), inset 0 1px 0 rgba(255,255,255,.25);
  }

  /* ── the board ─────────────────────────────────────────────────────────── */
  .grid { display: grid; gap: 13px; grid-template-columns: minmax(0, 1fr); }
  @media (min-width: 760px) { .grid { grid-template-columns: minmax(0, 1fr) minmax(0, 1fr); } }
  @media (min-width: 1180px) { .grid { grid-template-columns: repeat(3, minmax(0, 1fr)); } }

  .zone-head {
    grid-column: 1 / -1; display: flex; align-items: center; gap: 12px;
    font-family: var(--label); font-size: 11px; font-weight: 800; letter-spacing: .32em;
    text-transform: uppercase; color: var(--dim); padding: 14px 2px 2px;
  }
  .zone-head::before { content: "▚"; color: var(--accent, var(--dim)); letter-spacing: 0; }
  .zone-head::after { content: ""; flex: 1; height: 1px;
    background: linear-gradient(90deg, color-mix(in srgb, var(--accent, var(--line)) 45%, transparent), transparent); }
  .zone-head[data-zone="identity"] { --accent: var(--identity); color: color-mix(in srgb, var(--identity) 55%, var(--dim)); }
  .zone-head[data-zone="operate"]  { --accent: var(--operate);  color: color-mix(in srgb, var(--operate) 55%, var(--dim)); }
  .zone-head[data-zone="mind"]     { --accent: var(--mind);     color: color-mix(in srgb, var(--mind) 55%, var(--dim)); }

  /* ── panel — a glass display module, seated in the chassis. MATERIALITY RULE:
     displays are GLASS (translucent — the organism shows through), controls are
     METAL (tabs/buttons stay solid — you grip them). A per-panel backdrop-filter
     re-sampled the animating rings every frame AND its cost scaled with panel
     count (worse as the store grows); the vignette already occludes the rings in
     the panel band, so translucency carries the glass read without the blur. */
  .panel {
    --accent: var(--line-hot);
    background: linear-gradient(180deg, rgba(19,29,27,.62), rgba(14,21,20,.56));
    border: 1px solid var(--line); border-left: 2px solid color-mix(in srgb, var(--accent) 60%, var(--line));
    border-radius: 5px; padding: 0; min-width: 0; position: relative;
    box-shadow: inset 0 1px 0 rgba(255,255,255,.045), inset 0 -1px 0 rgba(0,0,0,.35), 0 8px 22px -16px #000;
    transition: border-color .16s ease, box-shadow .16s ease, transform .16s ease;
    animation: bootIn .32s ease-out both; display: flex; flex-direction: column;
  }
  .panel[data-zone="identity"] { --accent: var(--identity); }
  .panel[data-zone="operate"]  { --accent: var(--operate); }
  .panel[data-zone="mind"]     { --accent: var(--mind); }
  .panel:hover {
    border-color: color-mix(in srgb, var(--accent) 45%, var(--line));
    box-shadow: inset 0 1px 0 rgba(255,255,255,.05), 0 0 26px -10px var(--accent), 0 10px 26px -18px #000;
    transform: translateY(-1px);
  }
  .panel::after {  /* rivet — the "favorite robot" tactile detail */
    content: ""; position: absolute; top: 9px; right: 9px; width: 5px; height: 5px; border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, var(--faint), #0a0f11); box-shadow: 0 0 0 1px rgba(0,0,0,.5), inset 0 0 1px rgba(255,255,255,.2);
  }

  .phead {
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap; padding: 9px 13px; margin: 0;
    border-bottom: 1px solid var(--line); background: linear-gradient(180deg, rgba(255,255,255,.028), transparent);
  }
  .panel h2 {
    font-family: var(--label); font-size: 11px; font-weight: 700; letter-spacing: .16em; text-transform: uppercase;
    color: color-mix(in srgb, var(--accent) 62%, var(--ink)); margin: 0;
  }

  /* uniform content body (wrapped by finalizePanels) + click-to-expand */
  .pbody { padding: 11px 13px 12px; }
  .pbody > svg { padding: 0; margin-top: -2px; }
  .pbody.clamped { max-height: 232px; overflow: hidden; position: relative; }
  .pbody.clamped::after { content: ""; position: absolute; left: 0; right: 0; bottom: 0; height: 56px;
    background: linear-gradient(transparent, rgba(14,21,20,.94)); pointer-events: none; }
  .pbody.clamped.expanded { max-height: none; }
  .pbody.clamped.expanded::after { display: none; }
  .expander {
    font: 700 9.5px/1 var(--label); letter-spacing: .16em; text-transform: uppercase;
    color: color-mix(in srgb, var(--accent) 70%, var(--dim)); background: rgba(255,255,255,.02);
    border: 0; border-top: 1px solid var(--line); width: 100%; padding: 7px; cursor: pointer; transition: all .13s ease;
  }
  .expander:hover { color: var(--accent); background: color-mix(in srgb, var(--accent) 8%, transparent); }

  /* edit-class chip — a recessed status LED (armed/locked; lights up in Slice 2) */
  .chip {
    font: 800 9px/1.4 var(--label); letter-spacing: .08em; border-radius: 3px; padding: 2px 6px 2px 5px;
    display: inline-flex; align-items: center; gap: 4px; border: 1px solid currentColor;
    box-shadow: inset 0 0 6px -2px currentColor;
  }
  .chip::before { content: ""; width: 5px; height: 5px; border-radius: 50%; background: currentColor;
    box-shadow: 0 0 6px 0 currentColor, inset 0 0 1px rgba(255,255,255,.6); }
  .chip-A { color: var(--classA); background: color-mix(in srgb, var(--classA) 11%, transparent); }
  .chip-B { color: var(--classB); background: color-mix(in srgb, var(--classB) 11%, transparent); }
  .chip-C { color: var(--classC); background: color-mix(in srgb, var(--classC) 9%, transparent); }
  .src { color: var(--faint); font-size: 10px; margin-left: auto; overflow-wrap: anywhere; }

  .span2 { grid-column: 1 / -1; }
  @media (min-width: 1180px) { .span2 { grid-column: span 2; } }

  .kv { display: flex; justify-content: space-between; gap: 12px; padding: 3px 0; align-items: baseline; }
  .kv + .kv { border-top: 1px dotted color-mix(in srgb, var(--line) 70%, transparent); }
  .kv .k { color: var(--dim); flex: 0 0 auto; font-size: 11px; letter-spacing: .04em; text-transform: uppercase; }
  .kv .v { text-align: right; min-width: 0; overflow-wrap: anywhere; color: var(--ink); }

  .badge { display: inline-flex; align-items: center; gap: 6px; padding: 2px 9px; border-radius: 3px;
    font: 800 10px/1.5 var(--label); letter-spacing: .12em; text-transform: uppercase; }
  .badge::before { content: ""; width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
  .badge.live { color: var(--mind); background: color-mix(in srgb, var(--mind) 12%, transparent);
    border: 1px solid color-mix(in srgb, var(--mind) 40%, transparent); animation: pulse 2.6s ease-in-out infinite; }
  .badge.dark { color: var(--hot); background: color-mix(in srgb, var(--hot) 12%, transparent);
    border: 1px solid color-mix(in srgb, var(--hot) 40%, transparent); }

  .row { display: flex; flex-wrap: wrap; gap: 7px; align-items: baseline; padding: 5px 0;
    border-top: 1px solid color-mix(in srgb, var(--line) 60%, transparent); }
  .row:first-of-type { border-top: 0; }
  .lvl { color: var(--mind); font-weight: 700; flex: 0 0 auto; font-size: 11px;
    text-shadow: 0 0 8px color-mix(in srgb, var(--mind) 50%, transparent); }
  .name { color: var(--ink); min-width: 0; overflow-wrap: anywhere; }
  .clause { color: var(--dim); font-size: 12px; flex: 1 1 200px; min-width: 0; overflow-wrap: anywhere; }
  .tier { color: var(--operate); flex: 0 0 auto; font: 700 10px/1.6 var(--label); letter-spacing: .08em; text-transform: uppercase; }
  .etype { color: var(--identity); flex: 0 0 auto; font: 700 9px/1.7 var(--label); letter-spacing: .1em; text-transform: uppercase;
    border: 1px solid color-mix(in srgb, var(--identity) 30%, var(--line)); border-radius: 3px; padding: 0 5px; }
  .tags { color: color-mix(in srgb, var(--mind) 75%, var(--dim)); font-size: 11px; flex: 0 0 auto; opacity: .85; }
  .muted { color: var(--faint); flex: 0 0 auto; font-size: 11px; }

  pre.section { white-space: pre-wrap; word-break: break-word; overflow-wrap: anywhere; overflow: visible;
    margin: 0; color: var(--ink); font: 12px/1.6 var(--mono); }

  .err { color: var(--hot); font-size: 11.5px; padding: 3px 0; }
  .err::before { content: "▲ "; }
  .empty { color: var(--faint); font-style: italic; font-size: 12px; }
  .note { color: var(--dim); font-size: 10.5px; margin-top: 9px; letter-spacing: .03em; }

  /* ── the cognition trace — phosphor oscilloscope over real wrap vitals ──── */
  svg.scope {
    width: 100%; height: auto; display: block; border: 1px solid var(--line);
    border-radius: 4px;
    background: radial-gradient(130% 110% at 50% -10%, rgba(63,214,207,.05), transparent 55%), #0a100f;
  }
  svg.scope .grat { stroke: rgba(92,230,168,.07); stroke-width: 1; vector-effect: non-scaling-stroke; }
  svg.scope .trace-core {
    stroke-width: 1.7; stroke-linejoin: round; stroke-linecap: round;
    stroke-dasharray: 1; stroke-dashoffset: 1;
    animation: traceDraw 1.2s ease-out forwards;
  }
  svg.scope .trace-glow {
    stroke-width: 5.5; stroke-linejoin: round; stroke-linecap: round; opacity: .22;
    stroke-dasharray: 1; stroke-dashoffset: 1;
    animation: traceDraw 1.2s ease-out forwards, traceBreathe 10s ease-in-out 1.2s infinite;
  }
  svg.scope .ch1 { stroke: var(--mind); }
  svg.scope .ch2 { stroke: var(--identity); }
  svg.scope .ch3 { stroke: var(--operate); }
  /* read-side instrument controls — METAL (materiality rule), real verbs only:
     timebase redraws the window; a channel chip solos its trace (CSS-only). */
  .scope-bar { display: flex; gap: 6px; align-items: center; margin: 0 0 8px; }
  .scope-bar .lbl { font: 700 8.5px/1 var(--label); letter-spacing: .24em; text-transform: uppercase; color: var(--faint); margin-right: 3px; }
  .scope-tb {
    font: 700 9.5px/1 var(--label); letter-spacing: .1em; color: var(--dim);
    background: linear-gradient(180deg, #131e1c, #0c1513); border: 1px solid var(--line);
    border-bottom-width: 2px; border-radius: 3px; padding: 4px 9px; cursor: pointer; transition: all .13s ease;
  }
  .scope-tb:hover { color: var(--ink); border-color: var(--line-hot); }
  .scope-tb.active {
    color: #06120c; background: linear-gradient(180deg, var(--mind), #43c089);
    border-color: var(--mind); border-bottom-width: 1px; transform: translateY(1px);
  }
  .scope-legend { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 9px; }
  .scope-ch {
    font: 700 9px/1.4 var(--label); letter-spacing: .12em; cursor: pointer;
    background: none; border: 1px solid transparent; border-radius: 3px; padding: 3px 7px;
    transition: all .13s ease;
  }
  .scope-ch::before { content: "▰ "; }
  .scope-ch:hover { border-color: var(--line-hot); }
  .scope-ch[aria-pressed="true"] { border-color: currentColor; box-shadow: inset 0 0 8px -4px currentColor; }
  .scope-ch.ch1 { color: var(--mind); }
  .scope-ch.ch2 { color: var(--identity); }
  .scope-ch.ch3 { color: var(--operate); }
  /* solo: hide the other traces (visibility, not opacity — the glow's breathe
     animation owns opacity and would override a static opacity rule) */
  .scope-wrap[data-solo="ch1"] svg.scope polyline:not(.ch1),
  .scope-wrap[data-solo="ch2"] svg.scope polyline:not(.ch2),
  .scope-wrap[data-solo="ch3"] svg.scope polyline:not(.ch3) { visibility: hidden; }
  .scope-wrap[data-solo="ch1"] .scope-ch:not(.ch1),
  .scope-wrap[data-solo="ch2"] .scope-ch:not(.ch2),
  .scope-wrap[data-solo="ch3"] .scope-ch:not(.ch3) { opacity: .4; }
  body[data-vital="dark"] svg.scope { filter: grayscale(.5) brightness(.65); }

  .deck-foot { margin-top: 26px; text-align: center; color: var(--faint); font-size: 10px;
    letter-spacing: .26em; text-transform: uppercase; font-family: var(--label); position: relative; z-index: 1; }

  /* ── motion ────────────────────────────────────────────────────────────── */
  @keyframes pulse { 0%,100% { box-shadow: 0 0 9px -3px var(--mind); } 50% { box-shadow: 0 0 18px 0 var(--mind), inset 0 0 8px -2px var(--mind); } }
  @keyframes blink { 0%,55% { opacity: 1; } 56%,100% { opacity: 0; } }
  @keyframes bootIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes sweep { to { transform: translateX(120%); } }
  @keyframes wordGlow { 0%,100% { text-shadow: 0 0 18px rgba(92,230,168,.4), 0 0 2px rgba(92,230,168,.55); }
    50% { text-shadow: 0 0 26px rgba(92,230,168,.6), 0 0 3px rgba(92,230,168,.8); } }
  /* the orbital arcs — rotate + breathe, counter-rotating at varied rates */
  @keyframes orbit-cw1 { 0% { transform: rotate(0) scale(1); } 50% { transform: rotate(180deg) scale(1.05); } 100% { transform: rotate(360deg) scale(1); } }
  @keyframes orbit-cw2 { 0% { transform: rotate(0) scale(1); } 50% { transform: rotate(200deg) scale(1.09); } 100% { transform: rotate(360deg) scale(1); } }
  @keyframes orbit-cw3 { 0% { transform: rotate(0) scale(1.02); } 50% { transform: rotate(160deg) scale(1.12); } 100% { transform: rotate(360deg) scale(1.02); } }
  @keyframes orbit-ccw1 { 0% { transform: rotate(0) scale(1); } 50% { transform: rotate(-180deg) scale(1.07); } 100% { transform: rotate(-360deg) scale(1); } }
  @keyframes orbit-ccw2 { 0% { transform: rotate(0) scale(1.03); } 50% { transform: rotate(-200deg) scale(1.11); } 100% { transform: rotate(-360deg) scale(1.03); } }
  /* the core breathes + cycles the bioluminescent-atomic spectrum. The breath is
     RESPIRATORY, not sinusoidal: inhale (0→40%) / longer exhale (40→88%) / rest
     at the bottom (88→100%) — a calm ~6 breaths/min over the 10s cycle. The
     nucleus overshoots the halo so the inhale visibly LANDS through the blur. */
  @keyframes corePulse {
    0%   { transform: scale(.92); opacity: .4;  animation-timing-function: cubic-bezier(.37,0,.63,1); }
    40%  { transform: scale(1.26); opacity: .72; animation-timing-function: cubic-bezier(.45,0,.55,1); }
    88%  { transform: scale(.92); opacity: .4; }
    100% { transform: scale(.92); opacity: .4; }
  }
  @keyframes nucleusPulse {
    0%   { transform: scale(.85); opacity: .5;  animation-timing-function: cubic-bezier(.37,0,.63,1); }
    40%  { transform: scale(1.4); opacity: .95; animation-timing-function: cubic-bezier(.45,0,.55,1); }
    88%  { transform: scale(.85); opacity: .5; }
    100% { transform: scale(.85); opacity: .5; }
  }
  /* the scope: draw-in fires only on a real fetch (boot/refresh = a true
     event); the glow then breathes on the organism's own 10s envelope */
  @keyframes traceDraw { to { stroke-dashoffset: 0; } }
  @keyframes traceBreathe {
    0%, 88%, 100% { opacity: .16; }
    40% { opacity: .34; }
  }
  /* one shared crossfade — 6 layers staggered -5s apart (16.6% of the 30s cycle)
     each hold their color full for a window, then hand off; the plateau + soft
     fades keep the screen-blended sum ~constant so the breath stays smooth. */
  @keyframes hueCycle {
    0%, 100% { opacity: 0; }
    5%       { opacity: 1; }
    17%      { opacity: 1; }
    23%      { opacity: 0; }
  }
  @media (prefers-reduced-motion: no-preference) { .masthead::after { animation: sweep 1.1s ease-out .15s 1 both; } }
  @media (prefers-reduced-motion: reduce) {
    .panel, .badge.live, .entity::after, .wordmark, .core, .nucleus, .hue { animation: none; }
    /* specificity (0,3,0) so it beats the base `.core .hue` (0,2,0) by a margin, not
       by source order — a future block reorder can't silently kill the core here. */
    .core .hue.h1, .nucleus .hue.h1 { opacity: 1; }  /* hold one static hue so the core stays lit */
    .ring { animation: none; }  /* per-ring opacity ramp stays — it carries the depth */
    svg.scope .trace-core, svg.scope .trace-glow { animation: none; stroke-dashoffset: 0; }
  }
</style>
</head>
<body>
  <!-- the living rings: the substrate's vital-signs, made ambient. JS sets
       body[data-vital] from health.write_path_live → the organism's health. -->
  <div class="rings" aria-hidden="true">
    <div class="ring ring-0"></div><div class="ring ring-1"></div><div class="ring ring-2"></div>
    <div class="ring ring-3"></div><div class="ring ring-4"></div><div class="ring ring-5"></div>
    <div class="ring ring-6"></div><div class="ring ring-7"></div><div class="ring ring-8"></div>
    <div class="ring ring-9"></div><div class="ring ring-10"></div><div class="ring ring-11"></div>
    <div class="ring ring-12"></div>
    <div class="core">
      <span class="hue h1"></span><span class="hue h2"></span><span class="hue h3"></span>
      <span class="hue h4"></span><span class="hue h5"></span><span class="hue h6"></span>
    </div>
    <div class="nucleus">
      <span class="hue h1"></span><span class="hue h2"></span><span class="hue h3"></span>
      <span class="hue h4"></span><span class="hue h5"></span><span class="hue h6"></span>
    </div>
  </div>

  <div class="deck">
    <header class="masthead">
      <div class="brand">
        <div class="wordmark">Levain</div>
        <div class="model">Substrate Control · LVN-2 / Slice 1.5</div>
      </div>
      <div class="readout">
        <div class="unit">
          <span class="unit-label">Unit</span>
          <span class="entity" id="entity">—</span>
        </div>
        <div class="indicators">
          <span class="stamp" id="stamp"></span>
          <button id="refresh" type="button">⟳ sync</button>
        </div>
      </div>
    </header>
    <p class="sub" id="store">connecting…</p>
    <!-- Identity · Operate · Mind — the IA. "All" = the whole mind on one scroll;
         a zone filters to just that section of the deck. -->
    <nav class="tabs">
      <button class="tab active" type="button" data-zone="all">◍ All</button>
      <button class="tab" type="button" data-zone="identity">▣ Identity</button>
      <button class="tab" type="button" data-zone="operate">▶ Operate</button>
      <button class="tab" type="button" data-zone="mind">◆ Mind</button>
    </nav>
    <div class="grid" id="board"></div>
    <footer class="deck-foot">sovereign · localhost · read-only — the substrate, escaped the session</footer>
  </div>

<!-- The canonical render core (shared, transport-agnostic) + this surface's thin
     fetch lifecycle shim. Both served by `levain serve` from package data — no
     CDN, no framework, runs offline. -->
<script src="/dashboard_core.js"></script>
<script src="/dashboard_boot.js"></script>
</body>
</html>
